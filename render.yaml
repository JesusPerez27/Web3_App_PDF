# Blueprint de Render: despliega solo el backend (API Node).
# En el dashboard de Render: New → Blueprint → conecta este repo.
# Las variables secretas (RPC, claves, Pinata) configúralas en Environment.

services:
  - type: web
    name: web3-pdf-registry-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
